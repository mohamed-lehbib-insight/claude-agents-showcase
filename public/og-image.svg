<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
    </style>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="100%" stop-color="#0a0a18"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F5D4"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F5D4"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#00F5D4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00F5D4" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(0,245,212,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#heroBg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Ambient glows -->
  <ellipse cx="200" cy="300" rx="400" ry="350" fill="url(#glow1)"/>
  <ellipse cx="1000" cy="350" rx="380" ry="320" fill="url(#glow2)"/>

  <!-- Left border accent -->
  <rect x="0" y="0" width="4" height="630" fill="url(#iconGrad)"/>

  <!-- Icon -->
  <rect x="72" y="230" width="56" height="56" rx="14" fill="url(#iconGrad)"/>
  <path d="M103 243H97L83 281h9.5l3.2-8.5h11.8l3.2 8.5H120L103 243zm-4 7.5 4.4 15.4H94.6l4.4-15.4z" fill="white"/>

  <!-- Brand label — JetBrains Mono -->
  <text x="144" y="252" font-family="'JetBrains Mono', monospace" font-size="13" fill="#00F5D4" letter-spacing="3" opacity="0.9">CLAUDE CODE</text>
  <text x="144" y="272" font-family="'JetBrains Mono', monospace" font-size="11" fill="#4a4a6a" letter-spacing="2">MASTERY GUIDE</text>

  <!-- Main headline — Syne -->
  <text x="72" y="370" font-family="'Syne', sans-serif" font-size="82" font-weight="800" fill="white" letter-spacing="-2">The definitive</text>
  <text x="72" y="462" font-family="'Syne', sans-serif" font-size="82" font-weight="800" fill="url(#titleGrad)" letter-spacing="-2">Claude Code</text>
  <text x="72" y="554" font-family="'Syne', sans-serif" font-size="82" font-weight="800" fill="white" letter-spacing="-2">playbook.</text>

  <!-- Right side decorative terminal -->
  <rect x="820" y="180" width="320" height="270" rx="12" fill="rgba(10,10,24,0.9)" stroke="rgba(30,30,56,1)" stroke-width="1.5"/>
  <!-- Terminal header -->
  <rect x="820" y="180" width="320" height="36" rx="12" fill="rgba(13,13,28,1)"/>
  <rect x="820" y="204" width="320" height="12" fill="rgba(13,13,28,1)"/>
  <circle cx="843" cy="198" r="5" fill="#FF5F57"/>
  <circle cx="860" cy="198" r="5" fill="#FEBC2E"/>
  <circle cx="877" cy="198" r="5" fill="#28C840"/>
  <text x="960" y="203" font-family="'JetBrains Mono', monospace" font-size="10" fill="#4a4a6a" text-anchor="middle">claude-code</text>

  <!-- Terminal lines — JetBrains Mono -->
  <text x="844" y="238" font-family="'JetBrains Mono', monospace" font-size="12" fill="#00F5D4">$ claude</text>
  <text x="844" y="260" font-family="'JetBrains Mono', monospace" font-size="11" fill="#39FF14">✓  CLAUDE.md loaded</text>
  <text x="844" y="280" font-family="'JetBrains Mono', monospace" font-size="11" fill="#8888aa">&gt; Review @src/auth.ts</text>
  <text x="844" y="300" font-family="'JetBrains Mono', monospace" font-size="11" fill="#f0f0ff">✎  auth.ts  +47 lines</text>
  <text x="844" y="320" font-family="'JetBrains Mono', monospace" font-size="11" fill="#8888aa">&gt; /commit</text>
  <text x="844" y="340" font-family="'JetBrains Mono', monospace" font-size="11" fill="#39FF14">✓  feat(auth): JWT refresh</text>
  <text x="844" y="360" font-family="'JetBrains Mono', monospace" font-size="11" fill="#8888aa">&gt; /clear</text>
  <text x="844" y="380" font-family="'JetBrains Mono', monospace" font-size="11" fill="#39FF14">✓  Freed 24,816 tokens</text>
  <text x="844" y="408" font-family="'JetBrains Mono', monospace" font-size="12" fill="#00F5D4">&gt; </text>
  <rect x="861" y="397" width="7" height="14" fill="#00F5D4"/>

  <!-- Bottom pills — JetBrains Mono -->
  <rect x="820" y="475" width="96" height="26" rx="6" fill="rgba(0,245,212,0.1)" stroke="rgba(0,245,212,0.25)" stroke-width="1"/>
  <text x="868" y="492" font-family="'JetBrains Mono', monospace" font-size="10" fill="#00F5D4" text-anchor="middle" letter-spacing="1">/init</text>

  <rect x="926" y="475" width="96" height="26" rx="6" fill="rgba(124,58,237,0.1)" stroke="rgba(124,58,237,0.25)" stroke-width="1"/>
  <text x="974" y="492" font-family="'JetBrains Mono', monospace" font-size="10" fill="#9d5ff0" text-anchor="middle" letter-spacing="1">skills</text>

  <rect x="1032" y="475" width="96" height="26" rx="6" fill="rgba(255,107,53,0.1)" stroke="rgba(255,107,53,0.25)" stroke-width="1"/>
  <text x="1080" y="492" font-family="'JetBrains Mono', monospace" font-size="10" fill="#FF6B35" text-anchor="middle" letter-spacing="1">agents</text>

  <!-- InsightEx + GTI badges -->
  <rect x="820" y="520" width="90" height="22" rx="5" fill="rgba(0,245,212,0.06)" stroke="rgba(0,245,212,0.15)" stroke-width="1"/>
  <text x="865" y="535" font-family="'JetBrains Mono', monospace" font-size="10" fill="#00F5D4" text-anchor="middle">InsightEx</text>

  <rect x="920" y="520" width="70" height="22" rx="5" fill="rgba(124,58,237,0.06)" stroke="rgba(124,58,237,0.15)" stroke-width="1"/>
  <text x="955" y="535" font-family="'JetBrains Mono', monospace" font-size="10" fill="#9d5ff0" text-anchor="middle">GTI Intl</text>

  <!-- Bottom border -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#iconGrad)"/>
</svg>
